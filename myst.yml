# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  title: The Demonstration Laboratory
  # description:
  keywords: [physics; education; demonstrations; experiments]
  authors: [Freek Pols & Ron Haaksman]
  date: 2025-10-23
  github: https://github.com/Contemporary-Physicslab/Demolab
  

extends:
  - toc.yml
  - export.yml

site:
  template: book-theme
  options:
    logo: style/tudelft.png
    logo_dark: style/tudelft-dark.png
    favicon: style/favicon.ico
    folders: true
    hide_authors: true
    enable_service_worker: false
    execute_js: true
    style: ./style/custom.css
  parts:
    footer: style/footer.md


  actions:
    - title: PDF
      url: ./export/demobook