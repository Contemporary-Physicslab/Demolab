name: Sync GitHub to GitLab

on:
  push:
    branches:
      - gitlab_test  # Trigger only when this branch is updated

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Ensures all history is cloned

      - name: Push to GitLab
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Add GitLab as a remote (update URL for your repo)
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.tudelft.nl/education/as/ap/demolab.git

          # Use force-with-lease for safety
          git push --force-with-lease gitlab workflow_gitlab_test:workflow_gitlab_test
